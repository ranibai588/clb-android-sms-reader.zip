workflows:
  android-workflow:
    name: CLB SMS Reader APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          set -e
          echo "=== Gradle 8.3 Download ==="
          curl -fL https://services.gradle.org/distributions/gradle-8.3-bin.zip -o /tmp/gradle-8.3.zip
          unzip -q /tmp/gradle-8.3.zip -d /tmp/

          echo "=== Wrapper Create ==="
          /tmp/gradle-8.3/bin/gradle wrapper --gradle-version 8.3 --distribution-type bin
          chmod +x gradlew

          echo "=== APK Build ==="
          ./gradlew assembleDebug --no-daemon --stacktrace

          echo "=== APK Ready ==="
          find . -name "*.apk" -type f
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
