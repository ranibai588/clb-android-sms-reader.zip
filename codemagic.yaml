workflows:
  android-workflow:
    name: CLB SMS Reader APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Install Gradle
        script: |
          brew install gradle
          gradle --version
      - name: Create Gradle Wrapper
        script: |
          gradle wrapper --gradle-version 8.3 --distribution-type bin
          chmod +x gradlew
      - name: Build Debug APK
        script: ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
