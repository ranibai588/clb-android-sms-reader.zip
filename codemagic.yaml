workflows:
  android-workflow:
    name: CLB SMS Reader APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          set -e
          echo "=== Files Check ==="
          pwd
          ls -la

          echo "=== Gradle 8.3 Download ==="
          curl -fL https://services.gradle.org/distributions/gradle-8.3-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/

          echo "=== Building APK ==="
          /tmp/gradle-8.3/bin/gradle assembleDebug --no-daemon --stacktrace

          echo "=== APK Location ==="
          find . -name "*.apk" -type f
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
