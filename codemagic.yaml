workflows:
  android-workflow:
    name: CLB SMS Reader APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          set -e

          echo "=== SDK Path Check ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls /usr/local/share/android-sdk 2>/dev/null || echo "SDK not at default path"

          echo "=== Project Files ==="
          ls -la
          cat settings.gradle

          echo "=== Setup local.properties ==="
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/share/android-sdk}}"
          echo "sdk.dir=$SDK_PATH" > local.properties
          cat local.properties

          echo "=== Download Gradle 8.3 ==="
          curl -fL https://services.gradle.org/distributions/gradle-8.3-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/

          echo "=== Build APK ==="
          /tmp/gradle-8.3/bin/gradle assembleDebug --no-daemon

          echo "=== APK Done ==="
          find . -name "*.apk" -type f
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
